services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: datatruck-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ingest:
    build: .
    container_name: datatruck-ingest
    command: uv run python scripts/ingest_zendesk.py
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - logs:/app/logs
    # Runs once and exits — restart: no
    restart: "no"

  bot:
    build: .
    container_name: datatruck-bot
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - logs:/app/logs
      - data:/app/data
    restart: unless-stopped

  dashboard:
    build: .
    container_name: datatruck-dashboard
    command: uv run streamlit run src/admin/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8501:8501"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - logs:/app/logs
      - data:/app/data
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  logs:
    driver: local
  data:
    driver: local
